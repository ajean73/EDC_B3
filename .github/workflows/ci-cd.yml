name: ShopWise CI/CD (FR)

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  qualite:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Recuperer la branche
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialiser un .env minimal
        run: |
          cat > .env << EOF
          POSTGRES_DB=shopwise
          POSTGRES_USER=admin
          POSTGRES_PASSWORD=ci_password_change_me
          APP_CORS_ALLOWED_ORIGINS=http://localhost:4200
          EOF

      - name: Simuler le merge avec main (sans commit)
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main

      - name: Configurer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Compiler le backend
        run: |
          cd backend
          chmod +x gradlew
          ./gradlew --no-daemon clean test jacocoTestReport jacocoTestCoverageVerification bootJar

      - name: Configurer Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Tester le frontend avec seuils de couverture
        run: |
          cd frontend
          npm ci
          npm run test:ci:coverage

      - name: Compiler le frontend
        run: |
          cd frontend
          npm run build

      - name: Publier le rapport de couverture backend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/build/reports/jacoco/test/html
          if-no-files-found: warn
          retention-days: 14

      - name: Publier le rapport de couverture frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage
          if-no-files-found: warn
          retention-days: 14

      - name: Creer le fichier .env CI pour docker-compose
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'shopwise' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'admin' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          APP_CORS_ALLOWED_ORIGINS: ${{ vars.APP_CORS_ALLOWED_ORIGINS || 'http://localhost:4200' }}
        run: |
          POSTGRES_DB=${POSTGRES_DB:-shopwise}
          POSTGRES_USER=${POSTGRES_USER:-admin}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ci_password_change_me}
          APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200}

          cat > .env << EOF
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS}
          EOF

      - name: Construire les images Docker
        run: docker compose build

      - name: Relancer l'application avec docker compose (validation CI)
        run: |
          docker compose up --build -d
          docker compose ps

      - name: Afficher les logs Docker en cas d'echec
        if: failure()
        run: |
          if [ -f .env ]; then
            docker compose ps || true
            docker compose logs db backend frontend --tail=200 || true
          else
            echo "Aucun fichier .env present, logs docker compose ignores."
          fi

      - name: Nettoyer les conteneurs
        if: always()
        run: docker compose down -v

  deploy-main:
    needs: qualite
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.qualite.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Recuperer main
        uses: actions/checkout@v4

      - name: Initialiser un .env minimal
        run: |
          cat > .env << EOF
          POSTGRES_DB=shopwise
          POSTGRES_USER=admin
          POSTGRES_PASSWORD=cd_password_missing_secret
          APP_CORS_ALLOWED_ORIGINS=http://localhost:4200
          EOF

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Se connecter a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Definir les tags Docker
        run: |
          echo "BACKEND_IMAGE=${{ vars.DOCKERHUB_BACKEND_IMAGE || format('{0}/shopwise-backend', secrets.DOCKERHUB_USERNAME) }}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${{ vars.DOCKERHUB_FRONTEND_IMAGE || format('{0}/shopwise-frontend', secrets.DOCKERHUB_USERNAME) }}" >> $GITHUB_ENV
          echo "IMAGE_TAG_SHA=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Construire et pousser l image backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG_SHA }}

      - name: Construire et pousser l image frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG_SHA }}

      - name: Creer le fichier .env CD
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'shopwise' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'admin' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          APP_CORS_ALLOWED_ORIGINS: ${{ vars.APP_CORS_ALLOWED_ORIGINS || 'http://localhost:4200' }}
        run: |
          POSTGRES_DB=${POSTGRES_DB:-shopwise}
          POSTGRES_USER=${POSTGRES_USER:-admin}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cd_password_missing_secret}
          APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200}

          cat > .env << EOF
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS}
          EOF

      - name: Relancer l'application avec docker compose
        run: |
          docker compose up --build -d
          docker compose ps

      - name: Afficher les logs Docker en cas d'echec (CD)
        if: failure()
        run: |
          if [ -f .env ]; then
            docker compose ps || true
            docker compose logs db backend frontend --tail=200 || true
          else
            echo "Aucun fichier .env present, logs docker compose ignores."
          fi
